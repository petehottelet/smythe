name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check smythe/ tests/ benchmarks/ examples/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v --cov=smythe --cov-report=term --cov-report=xml

      - name: Upload coverage report (artifact)
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install offline benchmark dependencies
        run: pip install -e ".[dev]" "pillow>=10.0"
      - name: Exercise image concurrency harness offline
        run: >-
          python benchmarks/run_image_benchmarks.py
          --k 1,3 --images 4 --repeats 1
          --out "$RUNNER_TEMP/image.json"
          --artifact-dir "$RUNNER_TEMP/image-artifacts"
      - name: Exercise asset suite offline
        run: >-
          python benchmarks/run_asset_suite.py
          --out "$RUNNER_TEMP/asset-artifacts"
          --results "$RUNNER_TEMP/asset.json"
